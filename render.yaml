services:
  - type: web
    name: shmedium
    env: python
    region: oregon
    plan: free
    branch: portfolio-deploy
    buildCommand: |
      npm install --prefix react-app
      NODE_OPTIONS=--openssl-legacy-provider npm run build --prefix react-app
      pip install -r requirements.txt
      pip install psycopg2-binary
      flask db upgrade
      flask seed all
    startCommand: gunicorn app:app
    healthCheckPath: /api/docs
    autoDeploy: true
    envVars:
      - key: FLASK_APP
        value: app
      - key: FLASK_ENV
        value: production
      - key: SCHEMA
        value: shmedium_schema
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_BUCKET_NAME
        value: shmedium-prod-images-dcrader
      - key: AWS_REGION
        value: us-west-1
      - key: SENDGRID_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        value: digest@shmedium.app
      - key: APP_BASE_URL
        value: https://shmedium.onrender.com

  - type: cron
    name: shmedium-digest-daily
    env: python
    region: oregon
    schedule: "0 8 * * *"
    buildCommand: pip install -r requirements.txt && pip install psycopg2-binary
    startCommand: flask digest send-daily
    envVars:
      - key: FLASK_APP
        value: app
      - key: FLASK_ENV
        value: production
      - key: SCHEMA
        value: shmedium_schema
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        value: digest@shmedium.app
      - key: APP_BASE_URL
        value: https://shmedium.onrender.com
      - key: SECRET_KEY
        sync: false

  - type: cron
    name: shmedium-digest-weekly
    env: python
    region: oregon
    schedule: "0 9 * * 1"
    buildCommand: pip install -r requirements.txt && pip install psycopg2-binary
    startCommand: flask digest send-weekly
    envVars:
      - key: FLASK_APP
        value: app
      - key: FLASK_ENV
        value: production
      - key: SCHEMA
        value: shmedium_schema
      - key: DATABASE_URL
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: DIGEST_FROM_EMAIL
        value: digest@shmedium.app
      - key: APP_BASE_URL
        value: https://shmedium.onrender.com
      - key: SECRET_KEY
        sync: false
